<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Averian</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="https://i.ibb.co/MyMQMS1J/icon-192.png" />
    <link rel="apple-touch-icon" href="https://i.ibb.co/MyMQMS1J/icon-192.png" />
    <meta name="theme-color" content="#eab308" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script src="https://js.yoco.com/sdk/v1/yoco-sdk-web.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' }).then(registration => {
            // Check for updates periodically
            setInterval(() => {
              registration.update();
            }, 60 * 60 * 1000); // Check every hour
          });
        });

        // Reload the page when a new service worker takes over
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });

        // Check for updates when the user returns to the app
        window.addEventListener('focus', () => {
          navigator.serviceWorker.ready.then(registration => {
            registration.update();
          });
        });
      }
    </script>
  </body>
</html>
